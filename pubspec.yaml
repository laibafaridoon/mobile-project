name: smart_hospital
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  intl: ^0.20.2
  google_fonts: ^8.1.0
  image_picker: ^1.2.2

  # Firebase packages
  firebase_core: ^3.12.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.0

  # UI & State Management
  flutter_local_notifications: ^17.2.3
  connectivity_plus: ^6.1.1

  # Utilities
  uuid: ^4.0.0
  shared_preferences: ^2.2.3
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets section enabled
  assets:
    - assets/images/

# Launcher Icon configuration (Updated for Better Resolution)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"